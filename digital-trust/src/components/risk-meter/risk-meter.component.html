<div class="risk-meter-container">
  <h3>Risk Score</h3>
  <div class="gauge">
    <div class="gauge__body">
      <div class="gauge__fill" [style.transform]="'rotate(' + getRotation() + 'deg)'"></div>
      <div class="gauge__cover">{{ riskScore * 100 | number:'1.0-0' }}%</div>
    </div>
  </div>
</div>
