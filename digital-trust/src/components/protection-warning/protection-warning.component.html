<div class="warning-overlay" *ngIf="showWarning">
  <div class="warning-modal">
    <h2><mat-icon>warning</mat-icon> Unusual Payment Detected</h2>
    <p>This payment of <strong>{{ transaction?.amount | currency:'USD' }}</strong> to an unrecognized recipient appears unusual based on your recent activity.</p>
    
    <div class="explanation-section">
      <h4>Why is this unusual?</h4>
      <ul>
        <li *ngFor="let reason of explanation">{{ reason }}</li>
      </ul>
    </div>

    <div class="actions">
      <button mat-stroked-button color="primary" (click)="cancel()">Cancel Payment</button>
      <button mat-raised-button color="warn" (click)="confirm()">Confirm Payment</button>
    </div>
  </div>
</div>
