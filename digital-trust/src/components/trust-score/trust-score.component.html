<div class="trust-score-container">
  <h3>User Trust Score</h3>
  <div class="gauge">
    <div class="gauge__body">
      <div class="gauge__fill" [style.transform]="'rotate(' + getRotation() + 'deg)'"></div>
      <div class="gauge__cover">{{ trustScore | number:'1.0-0' }}</div>
    </div>
  </div>
</div>
