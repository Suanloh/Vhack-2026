<div class="simulator-container">
  <h3>Fraud Attack Simulator</h3>
  <p>Click the button to inject a burst of simulated fraudulent transactions into the system.</p>
  <button mat-raised-button color="warn" (click)="simulateAttack()">Simulate Fraud Attack</button>
  <div *ngIf="simulationResult">
    <p>{{ simulationResult }}</p>
  </div>
</div>
